<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- the ball, same construction as drawBall: mustard leather, a gently
       bowed seam cross, two side arcs, all wearing the ink outline —
       shrunk inside a ring of lighter leather, dribbble style -->
  <defs>
    <clipPath id="b"><circle cx="16" cy="16" r="14"/></clipPath>
  </defs>
  <g transform="translate(16 16) scale(0.78) translate(-16 -16)">
    <circle cx="16" cy="16" r="14" fill="#dfa63f"/>
    <g clip-path="url(#b)" stroke="#3a2e2a" stroke-width="1.4" fill="none">
      <path d="M2 16 Q16 21 30 16"/>
      <path d="M16 2 Q21 16 16 30"/>
      <circle cx="-5" cy="16" r="14.7"/>
      <circle cx="37" cy="16" r="14.7"/>
    </g>
    <circle cx="16" cy="16" r="14" fill="none" stroke="#3a2e2a" stroke-width="2.6"/>
  </g>
  <!-- r + stroke stays inside the 32 box; 2.4 holds a crisp ~1px at 16px -->
  <circle cx="16" cy="16" r="14.6" fill="none" stroke="#ebc887" stroke-width="2.4"/>
</svg>
